<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Pin Button Maker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
    <nav class="navbar fade-in">
        <div class="nav-content">
            <div class="nav-brand">Pin Button Maker</div>
            <button class="profile-btn" aria-label="Profile">
                <span class="profile-initial">A</span>
            </button>
        </div>
    </nav>

    <main class="main-container slide-up">
        <section class="hero-card">
            <div class="hero-content">
                <h1 class="hero-title">Create your next pin.</h1>
                <p class="hero-subtitle">Design custom button pins with elegant precision. Ready to make something new?</p>
                <button class="primary-btn hero-btn"><a href="editor.html">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Start New Project
                </button>
            </div>
        </section>

        <section class="recent-section">
            <div class="section-header">
                <h2 class="section-title">Recent Designs</h2>
            </div>

            <div class="empty-state">
                <div class="empty-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="16"></line>
                        <line x1="8" y1="12" x2="16" y2="12"></line>
                    </svg>
                </div>
                <h3>No designs yet</h3>
                <p>Your creative journey begins here. Start a new project to see your designs.</p>
            </div>
        </section>
    </main>
</body>
</html>
