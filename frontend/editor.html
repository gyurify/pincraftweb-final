<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor - Pin Button Maker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="pro-editor-body">

    <header class="editor-toolbar">
        <div class="toolbar-left">
            <a href="home.html" class="icon-btn" aria-label="Back to Dashboard" title="Dashboard">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
            <span class="toolbar-title">Untitled Design</span>
        </div>

        <div class="toolbar-center">
            <button class="tool-btn">Save</button>
            <button class="tool-btn">Load</button>
            <div class="divider"></div>
            <button class="tool-btn dropdown-btn">
                Size: 2.25"
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left:4px;"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </button>
            <div class="divider"></div>
            <button class="tool-btn action-highlight">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                Upload Image
            </button>
            <div class="divider"></div>
            <button class="tool-btn">Real Size</button>
            <button class="tool-btn">Print</button>
        </div>

        <div class="toolbar-right">
            <a href="login.html" class="tool-btn danger-text">Log Out</a>
        </div>
    </header>

    <div class="editor-main">
        
        <main class="workspace-area">
            
            <div class="canvas-wrapper">
                <div class="bleed-line" title="Bleed Area"></div>
                
                <div class="pin-edge">
                    <div class="safe-zone" title="Safe Zone"></div>
                    
                    <div class="mock-photo-bg">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    </div>
                    <div class="mock-curved-text-top">SUMMER VIBES</div>
                    <div class="mock-center-text" style="display: none;">2026</div>
                    
                    <div class="pin-gloss-overlay"></div>
                </div>
            </div>

            <div class="canvas-labels">
                <span class="label-indicator bleed-label"><span class="dot red"></span> Bleed Line</span>
                <span class="label-indicator safe-label"><span class="dot blue"></span> Safe Zone</span>
            </div>

            <div class="bottom-layer-tabs">
                <input type="radio" id="tab-t1" name="layer-tabs" hidden>
                <label for="tab-t1" class="layer-tab">Text 1</label>
                
                <input type="radio" id="tab-t2" name="layer-tabs" hidden disabled>
                <label for="tab-t2" class="layer-tab disabled-tab">Text 2</label>

                <input type="radio" id="tab-trt" name="layer-tabs" hidden>
                <label for="tab-trt" class="layer-tab">Text Round Top</label>

                <input type="radio" id="tab-trb" name="layer-tabs" hidden>
                <label for="tab-trb" class="layer-tab">Text Round Bottom</label>

                <input type="radio" id="tab-p" name="layer-tabs" checked hidden>
                <label for="tab-p" class="layer-tab">Photo</label>
            </div>
        </main>

        <aside class="properties-sidebar">
            
            <div class="property-section">
                <h3 class="section-title">Image</h3>
                
                <div class="row-group">
                    <div class="input-group half">
                        <button class="secondary-btn" style="padding: 10px;">Replace</button>
                    </div>
                    <div class="input-group half">
                        <button class="secondary-btn" style="padding: 10px;">Center Photo</button>
                    </div>
                </div>
                
                <div class="row-group">
                    <div class="input-group half">
                        <label>Opacity (%)</label>
                        <input type="number" value="100" class="pro-input">
                    </div>
                    <div class="input-group half">
                        <label>Blend Mode</label>
                        <select class="pro-select">
                            <option>Normal</option>
                            <option>Multiply</option>
                            <option>Overlay</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="property-section">
                <h3 class="section-title">Transform</h3>
                <div class="row-group">
                    <div class="input-group half">
                        <label>X Position</label>
                        <input type="number" value="0" class="pro-input">
                    </div>
                    <div class="input-group half">
                        <label>Y Position</label>
                        <input type="number" value="0" class="pro-input">
                    </div>
                </div>
                <div class="row-group">
                    <div class="input-group half">
                        <label>Scale (%)</label>
                        <input type="number" value="100" class="pro-input">
                    </div>
                    <div class="input-group half">
                        <label>Rotation (°)</label>
                        <input type="number" value="0" class="pro-input">
                    </div>
                </div>
            </div>

            <div class="property-section last-section">
                <h3 class="section-title">Layers</h3>
                <div class="layer-list">
                    
                    <div class="layer-item">
                        <div class="layer-visibility"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></div>
                        <span class="layer-name">Text 1</span>
                    </div>

                    <div class="layer-item hidden-layer">
                        <div class="layer-visibility">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                        </div>
                        <span class="layer-name">Text 2</span>
                    </div>

                    <div class="layer-item">
                        <div class="layer-visibility"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></div>
                        <span class="layer-name">Text Round Top</span>
                    </div>

                    <div class="layer-item">
                        <div class="layer-visibility"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></div>
                        <span class="layer-name">Text Round Bottom</span>
                    </div>

                    <div class="layer-item active-layer-item">
                        <div class="layer-visibility"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></div>
                        <span class="layer-name">Photo Layer</span>
                    </div>
                </div>
            </div>
        </aside>
    </div>
</body>
</html>
