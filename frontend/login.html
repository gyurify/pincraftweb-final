<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pin Button Maker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-container">
        <input type="checkbox" id="auth-toggle" class="auth-toggle-checkbox" hidden>
        
        <div class="card">
            
            <div class="auth-view login-view">
                <header class="card-header">
                    <span class="brand-name">Pin Button Maker</span>
                    <h1>Sign in</h1>
                    <p>Enter your details to access your account.</p>
                </header>

                <form class="auth-form" action="home.html" novalidate>
                    <div class="input-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" placeholder="name@example.com" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="primary-btn">Sign In</button>
                </form>

                <footer class="card-footer">
                    <p>
                        Don't have an account? 
                        <label for="auth-toggle" class="text-btn">Sign up</label>
                    </p>
                </footer>
            </div>

            <div class="auth-view register-view">
                <header class="card-header">
                    <span class="brand-name">Pin Button Maker</span>
                    <h1>Create account</h1>
                    <p>Join Pin Button Maker to get started.</p>
                </header>

                <form class="auth-form" action="home.html" novalidate>
                    <div class="input-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" placeholder="name@example.com" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" placeholder="Create a password" required>
                    </div>

                    <div class="input-group">
                        <label for="reg-confirm-password">Confirm Password</label>
                        <input type="password" id="reg-confirm-password" placeholder="Confirm your password" required>
                    </div>

                    <button type="submit" class="primary-btn">Sign Up</button>
                </form>

                <footer class="card-footer">
                    <p>
                        Already have an account? 
                        <label for="auth-toggle" class="text-btn">Sign in</label>
                    </p>
                </footer>
            </div>

        </div>
    </div>
</body>
</html>
